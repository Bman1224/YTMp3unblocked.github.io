<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube to MP3 Converter</title>
    <style>
        .container {
            max-width: 400px;
            margin: 40px auto;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        .subtitle {
            font-size: 18px;
            color: #666;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 10px;
        }
        
        input[type="text"] {
            width: 100%;
            height: 40px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        
        button {
            width: 100%;
            height: 40px;
            background-color: #4CAF50;
            color: #fff;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        
        button:hover {
            background-color: #3e8e41;
        }
        
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
        }
        
        .status.loading {
            background-color: #f0f0f0;
            color: #666;
        }
        
        .status.success {
            background-color: #c6efce;
            color: #3e8e41;
        }
        
        .status.error {
            background-color: #ffc6c6;
            color: #f44336;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1> YouTube to MP3 Converter</h1>
        <p class="subtitle">Convert any YouTube video to MP3</p>
        
        <div class="input-group">
            <label for="youtube-url">YouTube URL</label>
            <input 
                type="text" 
                id="youtube-url" 
                placeholder="https://www.youtube.com/watch?v=..."
            >
        </div>
        
        <button id="convert-btn">Convert to MP3</button>
        
        <div id="status" class="status"></div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
